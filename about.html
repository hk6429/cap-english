<h1>資料來源與著作權說明</h1>
<h2>題目來源</h2>
<p>本站題目取自國中教育會考（心測中心 cap.rcpet.edu.tw）官方公布之歷屆試題本、參考答案，以及各題官方公布通過率。目前收錄 105～115 年英語科（閱讀）共 461 題。</p>
<h2>著作權</h2>
<p>依《著作權法》第 9 條，依法令舉行之各類考試試題，不得為著作權標的。本站僅作教育用途的免費線上練習整理。</p>
<h2>答案正確性</h2>
<p>每一題答案均逐題比對心測中心官方公布之答案卡，若您發現任何疑義，歡迎與我們聯繫確認。</p>
